services:
  - type: web
    name: almacen-grocery
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: almacen
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
